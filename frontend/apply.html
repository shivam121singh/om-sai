<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Submit Application - Om Sai Training Center</title>

  <style>

    /* Premium Global UI Standard Styles */

    body {

      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

      background-color: #FAFAFA;

      color: #0F172A;

      margin: 0;

      padding: 3rem 1rem;

      display: flex;

      flex-direction: column;

      align-items: center;

      min-height: 100vh;

      box-sizing: border-box;

    }

   

    .back-home {

      margin-bottom: 2rem;

      text-decoration: none;

      color: #64748B;

      font-weight: 500;

      font-size: 0.95rem;

      transition: color 0.2s;

      display: flex;

      align-items: center;

      gap: 0.5rem;

    }

    .back-home:hover {

      color: #0F172A;

    }



    /* Form Container Architecture */

    .form-card {

      background-color: #FFFFFF;

      width: 100%;

      max-width: 42rem;

      padding: 2.5rem;

      border-radius: 1.25rem;

      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);

      border: 1px solid #E2E8F0;

    }

   

    /* Gate Prompt Card Layout styling when logged out */

    .prompt-card {

      text-align: center;

      padding: 4rem 2rem;

      background: #FFFFFF;

      border-radius: 1.25rem;

      border: 2px dashed #CBD5E1;

      max-width: 32rem;

      width: 100%;

      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);

    }

   

    .form-grid {

      display: grid;

      grid-template-cols: 1fr;

      gap: 1.25rem;

      margin-bottom: 1.5rem;

    }

    @media (min-width: 576px) {

      .form-grid { grid-template-cols: 1fr 1fr; }

    }

    .form-group {

      display: flex;

      flex-direction: column;

      gap: 0.375rem;

    }

    .form-group label {

      font-size: 0.85rem;

      font-weight: 600;

      color: #334155;

    }

    .form-group input, .form-group select {

      padding: 0.65rem 0.85rem;

      border: 1px solid #CBD5E1;

      border-radius: 0.5rem;

      outline: none;

      font-size: 1rem;

      background-color: #FFFFFF;

      transition: all 0.2s;

    }

    .form-group input:focus, .form-group select:focus {

      border-color: #F97316;

      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15);

    }

    input[type="file"] {

      background-color: #F8FAFC;

      border-style: dashed;

      border-width: 2px;

      cursor: pointer;

    }

   

    .btn-primary {

      background-color: #F97316;

      color: white;

      border: none;

      padding: 0.9rem 1.5rem;

      border-radius: 0.75rem;

      font-weight: 600;

      cursor: pointer;

      font-size: 1rem;

      width: 100%;

      transition: background 0.2s;

    }

    .btn-primary:hover { background-color: #EA580C; }

   

    .logout-user {

      background-color: #64748B;

      color: white;

      padding: 0.5rem 1rem;

      border: none;

      border-radius: 0.25rem;

      cursor: pointer;

      font-size: 0.85rem;

      transition: background 0.2s;

    }

    .logout-user:hover { background-color: #475569; }

   

    /* Shared Overlays Modal Popups Setup */

    .modal-overlay {

      position: fixed;

      top: 0;

      left: 0;

      width: 100%;

      height: 100%;

      background: rgba(15, 23, 42, 0.6);

      backdrop-filter: blur(4px);

      display: flex;

      align-items: center;

      justify-content: center;

      z-index: 100;

      opacity: 0;

      pointer-events: none;

      transition: opacity 0.3s ease;

    }

    .modal-overlay.active {

      opacity: 1;

      pointer-events: auto;

    }

    .modal-card {

      background: white;

      padding: 2.5rem 2rem;

      border-radius: 1.5rem;

      width: 100%;

      max-width: 24rem;

      position: relative;

      display: flex;

      flex-direction: column;

      gap: 1.25rem;

      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);

    }

    .modal-close {

      position: absolute;

      top: 1rem;

      right: 1rem;

      background: none;

      border: none;

      font-size: 1.5rem;

      cursor: pointer;

      color: #64748B;

    }

    .modal-footer {

      text-align: center;

      font-size: 0.875rem;

      color: #64748B;

    }

    .modal-footer span {

      color: #F97316;

      font-weight: 600;

      cursor: pointer;

    }

    .modal-footer span:hover { text-decoration: underline; }

   

    /* Global Feedback Alert Banners */

    #alertMessage, #modalAlertMessageLogin, #modalAlertMessageSignup {

      padding: 1rem;

      border-radius: 0.5rem;

      font-size: 0.9rem;

      font-weight: 500;

      display: none;

    }

    .success-banner { background-color: #DCFCE7; color: #15803D; border: 1px solid #BBF7D0; display: block !important; }

    .error-banner { background-color: #FEE2E2; color: #B91C1C; border: 1px solid #FCA5A5; display: block !important; }

    .hidden { display: none; }

  </style>

</head>

<body>



  <a href="index.html" class="back-home">

    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>

    Back to Homepage

  </a>



  <div class="prompt-card" id="authPromptCard">

    <h3 style="margin:0 0 0.5rem 0; font-size: 1.5rem;">Student Account Required</h3>

    <p style="color:#64748B; margin:0 0 1.75rem 0; line-height: 1.5;">Please sign in or register an applicant account to unlock our secure application file upload desk.</p>

    <button onclick="showLogin()" class="btn-primary" style="max-width: 220px;">Log In / Register ↗</button>

  </div>



  <div class="form-card" id="applyFormCard" style="display: none;">

    <div style="display:flex; justify-content:space-between; margin-bottom:1.5rem; align-items:center;">

      <span style="font-weight:700; color:#15803D; display: flex; align-items: center; gap: 0.35rem;">

        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>

        Session Securely Authenticated

      </span>

      <button id="logoutUserBtn" class="logout-user">Log Out</button>

    </div>

   

    <form id="applyForm">

      <div id="alertMessage"></div>

     

      <div class="form-grid">

        <div class="form-group">

          <label>Full Name (As in Official ID)</label>

          <input type="text" id="fullName" required placeholder="John Doe" />

        </div>

        <div class="form-group">

          <label>Email Address</label>

          <input type="email" id="email" required placeholder="john@example.com" />

        </div>

      </div>

     

      <div class="form-grid">

        <div class="form-group">

          <label>Phone Number</label>

          <input type="tel" id="phone" required placeholder="+91 98765-43210" />

        </div>

        <div class="form-group">

          <label>Desired Destination Country</label>

          <input type="text" id="destinationCountry" required placeholder="e.g., Canada, United Kingdom, Gulf" />

        </div>

      </div>

     

      <div class="form-grid">

        <div class="form-group">

          <label>Purpose of Placement</label>

          <select id="purpose">

            <option value="Job">Technical Work / Job Placement</option>

            <option value="Study">Vocational Training & Education</option>

            <option value="Visa">Visa Assistance Support</option>

          </select>

        </div>

        <div class="form-group">

          <label>Upload Resume/Credentials (PDF or Doc)</label>

          <input type="file" id="resumeFile" accept="application/pdf, .doc, .docx" required />

        </div>

      </div>



      <!-- NEW FORM GRID LAYER FOR CANDIDATE PHOTO UPLOAD -->

      <div class="form-grid">

        <div class="form-group" style="grid-column: span 2;">

          <label>Upload Passport Size Photo (JPG or PNG Image Format)</label>

          <input type="file" id="photoFile" accept="image/jpeg, image/png" required />

        </div>

      </div>

     

      <button type="submit" class="btn-primary">Submit Application Packet ↗</button>

    </form>

  </div>



  <div class="modal-overlay" id="loginModalOverlay">

    <div class="modal-card">

      <button class="modal-close" onclick="closeAllModals()">&times;</button>

      <h3 style="margin:0; text-align:center; font-size: 1.35rem;">Log In to Omsai</h3>

      <form id="loginForm" style="display:flex; flex-direction:column; gap:1.15rem;">

        <div id="modalAlertMessageLogin"></div>

        <div class="form-group">

          <label>Email Address</label>

          <input type="email" id="loginEmail" required placeholder="name@example.com" />

        </div>

        <div class="form-group">

          <label>Password</label>

          <input type="password" id="loginPassword" required placeholder="••••••••" />

        </div>

        <button type="submit" class="btn-primary" style="padding:0.8rem;">Sign In</button>

      </form>

      <div class="modal-footer">New applicant? <span onclick="showSignup()">Create account</span></div>

    </div>

  </div>



  <div class="modal-overlay" id="signupModalOverlay">

    <div class="modal-card">

      <button class="modal-close" onclick="closeAllModals()">&times;</button>

      <h3 style="margin:0; text-align:center; font-size: 1.35rem;">Create Account</h3>

      <form id="signupForm" style="display:flex; flex-direction:column; gap:1.15rem;">

        <div id="modalAlertMessageSignup"></div>

        <div class="form-group">

          <label>Email Address</label>

          <input type="email" id="signupEmail" required placeholder="name@example.com" />

        </div>

        <div class="form-group">

          <label>Create Password</label>

          <input type="password" id="signupPassword" required placeholder="••••••••" />

        </div>

        <button type="submit" class="btn-primary" style="padding:0.8rem;">Sign Up</button>

      </form>

      <div class="modal-footer">Already registered? <span onclick="showLogin()">Log in</span></div>

    </div>

  </div>



  <script>

    const loginModal = document.getElementById('loginModalOverlay');

    const signupModal = document.getElementById('signupModalOverlay');

   

    const showLogin = () => {

      signupModal.classList.remove('active');

      loginModal.classList.add('active');

    };

    const showSignup = () => {

      loginModal.classList.remove('active');

      signupModal.classList.add('active');

    };

    const closeAllModals = () => {

      loginModal.classList.remove('active');

      signupModal.classList.remove('active');

    };

   

    window.addEventListener('click', (e) => {

      if (e.target === loginModal || e.target === signupModal) closeAllModals();

    });

  </script>

 

  <script src="app.js"></script>

</body>

</html>
